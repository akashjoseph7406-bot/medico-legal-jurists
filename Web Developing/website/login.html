<!DOCTYPE html>
<html>
<head>
    <title>Login | Medico-Legal Juris</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body { text-align:center; }

        .tabs {
            display:flex;
            justify-content:center;
            margin:20px;
        }

        .tab-btn {
            padding:10px 20px;
            background:#222;
            color:white;
            border:none;
            cursor:pointer;
        }

        .tab-btn.active {
            background:#800020;
        }

        .box {
            max-width:400px;
            margin:auto;
            padding:20px;
            background:#111;
            border-radius:10px;
        }

        input {
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button {
            padding:10px;
            background:#800020;
            color:white;
            border:none;
            width:100%;
        }

        .error { color:red; }
    </style>
</head>

<body>

<header>
    <h1>⚖️ Medico-Legal Juris</h1>
    <p>Secure Access Portal</p>
</header>

<nav class="navbar">
    <a href="index.html">Home</a>
</nav>

<!-- TABS -->
<div class="tabs">
    <button class="tab-btn active" data-type="user">User Login</button>
    <button class="tab-btn" data-type="admin">Admin Login</button>
</div>

<!-- USER LOGIN -->
<div id="userBox" class="box">
    <h3>User Login</h3>

    <form id="userForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p class="error" id="errorMsg"></p>

    <p>
        New user?
        <a href="#" id="signupLink">Create Account</a>
    </p>
</div>

<!-- ADMIN LOGIN -->
<div id="adminBox" class="box" style="display:none;">
    <h3>Admin Login</h3>

    <form id="adminForm">
        <input type="email" id="adminEmail" placeholder="Admin Email" required>
        <input type="password" id="adminPassword" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p class="error" id="adminError"></p>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="box" style="display:none;">
    <h3>Create Account</h3>

    <input type="email" id="signupEmail" placeholder="Email"><br><br>
    <input type="password" id="signupPassword" placeholder="Password"><br><br>

    <button id="signupBtn">Sign Up</button>

    <p class="error" id="signupError"></p>

    <p><a href="#" id="backLogin">Back</a></p>
</div>

<footer>
    <p>© 2026 Medico-Legal Juris</p>
</footer>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { app, auth } from "./firebase.js";
import {
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    signOut
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const ADMIN_EMAIL = "akashjoseph7406@gmail.com";

// USER LOGIN
document.getElementById("userForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;
    const errorBox = document.getElementById("errorMsg");

    errorBox.innerText = "";

    signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {

        if (userCredential.user.email === ADMIN_EMAIL) {
            errorBox.innerText = "Use Admin Login.";
            signOut(auth);
            return;
        }

        // 🔥 CRITICAL: sync with navbar
        localStorage.setItem("userLoggedIn", "true");

        window.location.href = "index.html";
    })
    .catch(() => {
        errorBox.innerText = "Invalid credentials.";
    });
});

// ADMIN LOGIN
document.getElementById("adminForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = adminEmail.value.trim().toLowerCase();
    const password = adminPassword.value;
    const errorBox = document.getElementById("adminError");

    errorBox.innerText = "";

    signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {

        if (userCredential.user.email !== ADMIN_EMAIL) {
            errorBox.innerText = "Not admin.";
            signOut(auth);
            return;
        }

        localStorage.setItem("userLoggedIn", "true");

        window.location.href = "admin.html";
    })
    .catch(() => {
        errorBox.innerText = "Invalid admin login.";
    });
});

// SIGNUP
document.getElementById("signupBtn").addEventListener("click", function(){

    const email = signupEmail.value;
    const password = signupPassword.value;
    const errorBox = document.getElementById("signupError");

    errorBox.innerText = "";

    createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
        signOut(auth);
        alert("Account created! Please login.");
        showLogin();
    })
    .catch((error) => {
        errorBox.innerText = error.message;
    });
});

</script>

<!-- ================= UI CONTROL ================= -->
<script>
document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", function(){
        const type = this.dataset.type;

        userBox.style.display = (type === "user") ? "block" : "none";
        adminBox.style.display = (type === "admin") ? "block" : "none";

        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        this.classList.add("active");
    });
});

signupLink.onclick = () => {
    userBox.style.display = "none";
    signupBox.style.display = "block";
};

backLogin.onclick = () => {
    signupBox.style.display = "none";
    userBox.style.display = "block";
};

// clear inputs
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll("input").forEach(i => i.value = "");
});
</script>

</body>
</html>
