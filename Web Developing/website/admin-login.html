<!DOCTYPE html>
<html>
<head>
    <title>Admin Login | Medico-Legal Juris</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            text-align: center;
            background: #0d0d0d;
            color: white;
        }

        .login-box {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: #111;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #800020;
            color: white;
            border: none;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>⚙️ Admin Login</h2>

    <form onsubmit="adminLogin(event)">
        <input type="email" id="email" placeholder="Admin Email" required autocomplete="off">
        <input type="password" id="password" placeholder="Password" required autocomplete="new-password">
        <button type="submit">Login</button>
    </form>

    <p class="error" id="errorMsg"></p>

</div>

<script>

// 🔐 FIXED ADMIN CREDENTIALS
const ADMIN_EMAIL = "Akashjoseph7406@gmail.com";
const ADMIN_PASSWORD = "Akash@965";

// 🔐 LOGIN FUNCTION
function adminLogin(e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorBox = document.getElementById("errorMsg");

    errorBox.innerText = "";

    if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {

        //  Save session
        localStorage.setItem("adminLoggedIn", "true");

        //  REDIRECT TO HOME PAGE (as you asked)
        window.location.href = "index.html";

    } else {
        errorBox.innerText = "Invalid admin credentials.";
    }
}

</script>

</body>
</html>
